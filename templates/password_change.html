{{define "password_change"}}
<div class="max-w-sm mx-auto">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight mb-1">Mudar palavra-chave</h2>
    <p class="text-sm text-gray-400 dark:text-gray-500 mb-7">Introduce a tua palavra-chave actual e a nova</p>

    {{if .Error}}
    <div class="bg-red-500/10 border border-red-500/15 text-red-600 dark:text-red-400 px-5 py-3 rounded-2xl mb-6 text-sm font-medium backdrop-blur-sm">
        {{.Error}}
    </div>
    {{end}}

    <div class="ios-card rounded-2xl overflow-hidden p-5">
        <form method="POST" action="/password" class="space-y-4">
            <div>
                <label for="current" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Palavra-chave actual</label>
                <input type="password" id="current" name="current_password" required maxlength="128"
                       class="w-full px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200">
            </div>
            <div>
                <label for="new" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nova palavra-chave</label>
                <input type="password" id="new" name="new_password" required maxlength="128"
                       class="w-full px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200">
            </div>
            <div>
                <label for="confirm" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Confirmar nova</label>
                <input type="password" id="confirm" name="confirm_password" required maxlength="128"
                       class="w-full px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200">
            </div>
            <button type="submit"
                    class="w-full bg-gradient-to-r from-violet-500 to-indigo-500 text-white py-3.5 rounded-2xl text-[15px] font-semibold hover:shadow-lg hover:shadow-violet-500/20 transition-all duration-300 active:scale-[0.98]">
                Mudar palavra-chave
            </button>
        </form>
    </div>

    <a href="/settings" class="inline-flex items-center gap-1.5 mt-6 text-sm text-gray-400 hover:text-violet-500 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Voltar à configuraçom
    </a>
</div>
{{end}}
