{{define "list_create"}}
<div x-data="listCreator()" class="max-w-lg mx-auto">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white tracking-tight mb-1">Criar nova lista</h2>
    <p class="text-sm text-gray-400 dark:text-gray-500 mb-7">Engade elementos e escolhe como os ordenar</p>

    <!-- Nome -->
    <div class="mb-5">
        <label for="list-name" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nome da lista</label>
        <input type="text" id="list-name" x-model="listName" maxlength="150"
               class="w-full px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200"
               placeholder="Ex: Melhores filmes de terror">
    </div>

    <!-- Descriçom -->
    <div class="mb-5">
        <label for="list-description" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Descriçom (opcional)</label>
        <textarea id="list-description" x-model="description" rows="2" maxlength="500"
                  class="w-full px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200 resize-none"
                  placeholder="Breve descriçom da lista"></textarea>
    </div>

    <!-- Engadir elementos -->
    <div class="flex gap-2 mb-2">
        <input type="text" x-model="newItem" maxlength="200"
               @keydown.enter.prevent="addItem()"
               x-ref="itemInput"
               class="flex-1 px-4 py-3.5 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-2xl focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all text-[15px] text-gray-800 dark:text-gray-200"
               placeholder="Escreve um elemento e preme Enter">
        <button @click="addItem()" type="button"
                class="bg-gray-900 dark:bg-white/10 text-white px-5 py-3.5 rounded-2xl text-sm font-semibold hover:bg-gray-800 dark:hover:bg-white/15 transition-colors whitespace-nowrap active:scale-[0.97]">
            Engadir
        </button>
    </div>

    <!-- Lista de elementos -->
    <div class="mb-7" x-show="items.length > 0" x-transition.opacity.duration.300ms>
        <p class="text-xs text-gray-400 dark:text-gray-500 mb-2 font-medium" x-text="items.length + ' elementos'"></p>
        <div class="ios-card rounded-2xl divide-y divide-gray-100/60 dark:divide-white/5 overflow-hidden">
            <template x-for="(item, index) in items" :key="index">
                <div>
                    <div class="flex items-center gap-3 px-5 py-3.5 group">
                        <span class="text-xs text-gray-300 dark:text-gray-600 font-mono w-5 text-right tabular-nums" x-text="(index + 1)"></span>
                        <span class="flex-1 text-[15px] text-gray-700 dark:text-gray-300 font-medium" x-text="item.name"></span>
                        <!-- Indicador de detalhes -->
                        <span x-show="item.description || item.link || item.image" class="w-1.5 h-1.5 rounded-full bg-violet-400 shrink-0"></span>
                        <!-- Botom expandir detalhes -->
                        <button @click="item.expanded = !item.expanded" type="button"
                                class="w-6 h-6 rounded-full bg-gray-100/80 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/15 flex items-center justify-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-all text-xs shrink-0"
                                :class="item.expanded ? 'bg-violet-100 dark:bg-violet-500/20 text-violet-500' : ''">
                            <svg class="w-3 h-3 transition-transform duration-200" :class="item.expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <button @click="removeItem(index)" type="button"
                                class="opacity-0 group-hover:opacity-100 w-6 h-6 rounded-full bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 flex items-center justify-center text-red-400 hover:text-red-500 transition-all text-sm leading-none shrink-0">&times;</button>
                    </div>
                    <!-- Detalhes expandidos -->
                    <div x-show="item.expanded" x-transition.opacity.duration.200ms class="px-5 pb-4 pt-0 ml-8 space-y-2.5">
                        <div>
                            <label class="text-[11px] text-gray-400 dark:text-gray-500 font-medium uppercase tracking-wider">Descriçom</label>
                            <textarea x-model="item.description" maxlength="600" rows="2"
                                      class="w-full mt-1 px-3 py-2 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-xl text-[13px] text-gray-700 dark:text-gray-300 resize-none focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all"
                                      placeholder="Descriçom breve (opcional, máx. 100 palavras)"></textarea>
                        </div>
                        <div x-data="{get linkOk(){ return !item.link || allowedPatterns.some(p => item.link.toLowerCase().includes(p.toLowerCase())) }}">
                            <label class="text-[11px] text-gray-400 dark:text-gray-500 font-medium uppercase tracking-wider">Ligaçom</label>
                            <input type="url" x-model="item.link" maxlength="500"
                                   class="w-full mt-1 px-3 py-2 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-xl text-[13px] text-gray-700 dark:text-gray-300 focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all"
                                   :class="!linkOk ? 'border-red-400 dark:border-red-500' : ''"
                                   placeholder="Só se permitem ligaçons de determinadas webs">
                            <p x-show="!linkOk" class="text-[10px] text-red-500 mt-1">Ligaçom nom válida</p>
                            <p x-show="linkOk" class="text-[10px] text-gray-400 dark:text-gray-500 mt-1">Wikipedia, YouTube, Spotify, redes sociais…</p>
                        </div>
                        <div x-data="{uploading: false, uploadError: '', async doUpload(e){ const f=e.target.files[0]; if(!f) return; uploading=true; uploadError=''; const fd=new FormData(); fd.append('image',f); try{ const r=await fetch('/api/upload-image',{method:'POST',body:fd}); const d=await r.json(); if(d.url) item.image=d.url; else uploadError=d.error||'Erro'; } catch(ex){ uploadError='Erro de rede'; } finally{ uploading=false; e.target.value=''; } }}">
                            <label class="text-[11px] text-gray-400 dark:text-gray-500 font-medium uppercase tracking-wider">Imagem</label>
                            <div class="flex gap-2 mt-1">
                                <input type="url" x-model="item.image" maxlength="500"
                                       class="flex-1 px-3 py-2 bg-white/50 dark:bg-white/5 border border-gray-200/60 dark:border-white/10 rounded-xl text-[13px] text-gray-700 dark:text-gray-300 focus:ring-2 focus:ring-violet-500/30 focus:border-violet-300 dark:focus:border-violet-500 outline-none transition-all"
                                       placeholder="URL da imagem">
                                <label class="relative cursor-pointer shrink-0" :class="uploading ? 'opacity-60 pointer-events-none' : ''">
                                    <input type="file" accept="image/*" class="sr-only" @change="doUpload($event)">
                                    <span class="flex items-center gap-1.5 px-3 py-2 bg-gray-100/80 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/15 rounded-xl text-[12px] font-medium text-gray-600 dark:text-gray-300 transition-colors whitespace-nowrap">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                                        <span x-text="uploading ? '…' : 'Subir'"></span>
                                    </span>
                                </label>
                            </div>
                            <p class="text-[10px] text-gray-400/70 dark:text-gray-600 mt-1">As imagens ficam alojadas num servidor externo público.</p>
                            <p x-show="uploadError" class="text-[10px] text-red-500 mt-1" x-text="uploadError"></p>
                            <div x-show="item.image" class="mt-2 relative inline-block">
                                <img :src="item.image" alt="" class="h-14 w-auto rounded-lg object-cover border border-gray-200/60 dark:border-white/10" @error="item.image=''">
                                <button type="button" @click="item.image=''" class="absolute -top-1.5 -right-1.5 w-5 h-5 bg-red-500 rounded-full text-white text-xs flex items-center justify-center leading-none">&times;</button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Selector modo versus -->
    <div class="mb-7" x-show="items.length >= 2 && listName.trim()" x-transition.opacity.duration.300ms>
        <div class="ios-card rounded-2xl p-5">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Modo Versus</p>
            <div class="flex bg-gray-100/80 dark:bg-white/5 rounded-xl p-1 gap-1">
                <button type="button" @click="versusMode = 'rapido'"
                        :class="versusMode === 'rapido' ? 'bg-white dark:bg-white/10 shadow-sm text-gray-900 dark:text-white font-semibold' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'"
                        class="flex-1 py-2.5 rounded-[10px] text-sm transition-all duration-200 text-center">
                    Rápido
                </button>
                <button type="button" @click="versusMode = 'detalhado'"
                        :class="versusMode === 'detalhado' ? 'bg-white dark:bg-white/10 shadow-sm text-gray-900 dark:text-white font-semibold' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300'"
                        class="flex-1 py-2.5 rounded-[10px] text-sm transition-all duration-200 text-center">
                    Detalhado
                </button>
            </div>
            <p class="mt-2.5 text-xs text-gray-400 dark:text-gray-500 leading-relaxed">
                <strong class="text-gray-500 dark:text-gray-400">Rápido:</strong> menos perguntas, resultado menos exato.
                <strong class="text-gray-500 dark:text-gray-400">Detalhado:</strong> mais perguntas, resultado mais certeiro.
                Podes reordenar manualmente depois.
            </p>
        </div>
    </div>

    <!-- Botons de ordenaçom -->
    <div class="text-center">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Como queres ordenar?</p>
        <div class="flex flex-col sm:flex-row gap-3">
            <button @click="saveList('manual')"
                    :disabled="items.length < 2 || !listName.trim()"
                    :class="items.length < 2 || !listName.trim() ? 'opacity-40 cursor-not-allowed' : 'hover:shadow-lg hover:shadow-gray-200/50 dark:hover:shadow-black/20 hover:-translate-y-0.5 active:scale-[0.98]'"
                    class="flex-1 px-6 py-4 ios-card rounded-2xl font-semibold text-gray-700 dark:text-gray-300 transition-all duration-300 text-[15px]">
                Orde manual
            </button>
            <button @click="saveList('versus')"
                    :disabled="items.length < 2 || !listName.trim()"
                    :class="items.length < 2 || !listName.trim() ? 'opacity-40 cursor-not-allowed' : 'hover:shadow-xl hover:shadow-violet-500/20 hover:-translate-y-0.5 active:scale-[0.98]'"
                    class="flex-1 px-6 py-4 bg-gradient-to-r from-violet-500 to-indigo-500 text-white rounded-2xl font-semibold transition-all duration-300 text-[15px]">
                Modo Versus
            </button>
        </div>
        <p x-show="items.length < 2" class="text-xs text-gray-400 dark:text-gray-500 mt-3">Engade ao menos 2 elementos</p>
    </div>

    <!-- Hidden form -->
    <form x-ref="form" method="POST" action="/lists" style="display:none">
        <input type="hidden" name="name" :value="listName">
        <input type="hidden" name="description" :value="description">
        <input type="hidden" name="items" :value="JSON.stringify(items)">
        <input type="hidden" name="order_mode" x-ref="orderMode">
        <input type="hidden" name="versus_mode" :value="versusMode">
    </form>
</div>

<script>
function listCreator() {
    return {
        listName: '',
        description: '',
        newItem: '',
        items: [],
        versusMode: '{{.DefaultVersusMode}}' || 'rapido',
        allowedPatterns: {{allowedPatterns}},
        addItem() {
            const name = this.newItem.trim();
            if (name && !this.items.some(i => i.name === name)) {
                this.items.push({ name: name, description: '', link: '', image: '', expanded: false });
                this.newItem = '';
            }
            this.$refs.itemInput.focus();
        },
        removeItem(index) { this.items.splice(index, 1); },
        saveList(mode) {
            if (!this.listName.trim() || this.items.length < 2) return;
            this.$refs.orderMode.value = mode;
            this.$refs.form.submit();
        }
    };
}
</script>
{{end}}
