# Docker Compose for proj_listas
# Stack: Projects | Container: proj_listas
# Port: 7010

services:
  proj_listas:
    build: .
    container_name: proj_listas
    ports:
      - "7010:7010"
    volumes:
      # Volume to persist SQLite database
      - ./config/link_domains.txt:/app/config/link_domains.txt
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/listas.db
      - DOMAINS_PATH=/app/config/link_domains.txt
    networks:
      - truerat_public
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 512m
networks:
  truerat_public:
    external: true
